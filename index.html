<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ARTS RÉF</title>
</head>
<body>
    <div id="main-grid"></div>

    <script src="data.js"></script>

    <script>
        const grid = document.getElementById('main-grid');
        if (typeof DATA_SOURCE !== 'undefined') {
            DATA_SOURCE.artistes.forEach(art => {
                grid.innerHTML += `<div><h3>${art.nom}</h3></div>`;
            });
        }
    </script>
</body>
</html>
