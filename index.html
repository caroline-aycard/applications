<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue Artistes</title>
    
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        
        /* Contrôles */
        .controls { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .filter-group { margin-bottom: 15px; }
        .filter-btn { padding: 8px 16px; margin: 4px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; background: #fff; }
        .filter-btn.active { background: #333; color: #fff; border-color: #333; }
        
        /* Grille */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; background: #eee; }
        .card-body { padding: 15px; }
    </style>
</head>
<body>

    <div class="controls">
        <div id="filter-themes" class="filter-group"><strong>Thèmes :</strong> </div>
        <div id="filter-techniques" class="filter-group"><strong>Techniques :</strong> </div>
    </div>

    <div id="results" class="grid"></div>

    <script src="data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');

        // Récupérer image depuis Wikipédia API
        async function getWikiImage(wikiTitle) {
            try {
                const url = `https://fr.wikipedia.org/w/api.php?action=query&titles=${wikiTitle}&prop=pageimages&format=json&pithumbsize=300&origin=*`;
                const response = await fetch(url);
                const data = await response.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                return pages[pageId].thumbnail ? pages[pageId].thumbnail.source : 'https://via.placeholder.com/300?text=Image+indisponible';
            } catch(e) { return 'https://via.placeholder.com/300?text=Image+indisponible'; }
        }

        async function initFilters() {
            const themes = new Set();
            const techs = new Set();
            DATA_SOURCE.artistes.forEach(a => {
                a.themes.forEach(t => themes.add(t));
                a.techniques.forEach(t => techs.add(t));
            });

            createButtons('filter-themes', themes, 'theme');
            createButtons('filter-techniques', techs, 'tech');
            render(); // Rendu initial
        }

        function createButtons(containerId, set, type) {
            const container = document.getElementById(containerId);
            Array.from(set).sort().forEach(val => {
                const btn = document.createElement('button');
                btn.textContent = val;
                btn.className = 'filter-btn ' + type;
                btn.onclick = () => {
                    btn.classList.toggle('active');
                    render();
                };
                container.appendChild(btn);
            });
        }

        async function render() {
            const activeThemes = Array.from(document.querySelectorAll('.filter-btn.theme.active')).map(b => b.textContent);
            const activeTechs = Array.from(document.querySelectorAll('.filter-btn.tech.active')).map(b => b.textContent);

            const filtered = DATA_SOURCE.artistes.filter(a => {
                const matchTheme = activeThemes.length === 0 || a.themes.some(t => activeThemes.includes(t));
                const matchTech = activeTechs.length === 0 || a.techniques.some(t => activeTechs.includes(t));
                return matchTheme && matchTech;
            });

            // Génération des cartes
            resultsDiv.innerHTML = '';
            for (let a of filtered) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img id="img-${a.id}" src="" alt="${a.nom}">
                    <div class="card-body">
                        <h3>${a.nom}</h3>
                        <p>${a.dates}</p>
                        <p><strong>${a.oeuvre_phare}</strong></p>
                    </div>
                `;
                resultsDiv.appendChild(card);
                // Charger l'image en arrière-plan
                getWikiImage(a.image_wikipedia).then(src => {
                    document.getElementById(`img-${a.id}`).src = src;
                });
            }
        }

        initFilters();
    </script>
</body>
</html>
