<script>
    const grid = document.getElementById('main-grid');
    
    // Si DATA_SOURCE est un tableau simple, on retire ".artistes"
    if (typeof DATA_SOURCE !== 'undefined') {
        DATA_SOURCE.forEach(art => { // <-- J'ai retiré ".artistes" ici
            grid.innerHTML += `<div><h3>${art.nom}</h3></div>`;
        });
    } else {
        console.error("DATA_SOURCE n'est pas chargé ! Vérifiez le fichier data.js");
    }
</script>
