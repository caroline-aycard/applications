<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Musée Digital</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --primary: #6366f1; --accent: #ec4899; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        
        /* Home Screen */
        #home-view { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 50px auto; }
        .nav-btn { padding: 30px; border-radius: 20px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: transform 0.2s; }
        .nav-btn:hover { transform: scale(1.05); }
        .btn-theme { background: linear-gradient(135deg, #6366f1, #a855f7); }
        .btn-tech { background: linear-gradient(135deg, #ec4899, #f43f5e); }
        .btn-artist { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-courant { background: linear-gradient(135deg, #10b981, #059669); }

        /* App View */
        #app-view { display: none; }
        .controls { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .filter-btn { padding: 8px 15px; margin: 4px; border: 1px solid #e2e8f0; border-radius: 20px; cursor: pointer; background: white; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-body { padding: 15px; }
    </style>
</head>
<body>

    <div id="home-view">
        <button class="nav-btn btn-theme" onclick="showApp('theme')">Thèmes</button>
        <button class="nav-btn btn-tech" onclick="showApp('tech')">Techniques</button>
        <button class="nav-btn btn-artist" onclick="showApp('artist')">Artistes</button>
        <button class="nav-btn btn-courant" onclick="showApp('courant')">Courants</button>
    </div>

    <div id="app-view">
        <button onclick="location.reload()" style="margin-bottom: 15px;">← Retour Accueil</button>
        <div class="controls" id="filter-container">
            <h3 id="current-title"></h3>
            <div id="filters"></div>
        </div>
        <div id="results" class="grid"></div>
    </div>

    <script src="data.js"></script>
    <script>
        let currentMode = '';

        function getTopItems(key, limit = 10) {
            const counts = {};
            DATA_SOURCE.artistes.forEach(a => {
                const items = Array.isArray(a[key]) ? a[key] : [a[key]];
                items.forEach(item => counts[item] = (counts[item] || 0) + 1);
            });
            return Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, limit).map(x => x[0]);
        }

        function showApp(mode) {
            currentMode = mode;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';
            document.getElementById('current-title').textContent = 'Filtrer par ' + mode;
            
            const filtersDiv = document.getElementById('filters');
            filtersDiv.innerHTML = '';
            
            const items = (mode === 'artist') ? DATA_SOURCE.artistes.map(a => a.nom) : getTopItems(mode === 'tech' ? 'techniques' : mode + 's');
            
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = item;
                btn.onclick = () => { btn.classList.toggle('active'); render(); };
                filtersDiv.appendChild(btn);
            });
            render();
        }

        async function render() {
            const active = Array.from(document.querySelectorAll('.filter-btn.active')).map(b => b.textContent);
            const filtered = active.length === 0 ? DATA_SOURCE.artistes : DATA_SOURCE.artistes.filter(a => {
                const vals = (currentMode === 'artist') ? [a.nom] : (currentMode === 'tech' ? a.techniques : a[currentMode + 's']);
                return vals.some(v => active.includes(v));
            });

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            
            for (let a of filtered) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img id="img-${a.id}" src=""> <div class="card-body"><h3>${a.nom}</h3><p>${a.oeuvre_phare}</p></div>`;
                resultsDiv.appendChild(card);
                
                fetch(`https://fr.wikipedia.org/w/api.php?action=query&titles=${a.image_wikipedia}&prop=pageimages&format=json&pithumbsize=300&origin=*`)
                .then(r => r.json()).then(data => {
                    const page = Object.values(data.query.pages)[0];
                    if(page.thumbnail) document.getElementById(`img-${a.id}`).src = page.thumbnail.source;
                });
            }
        }
    </script>
</body>
</html>
