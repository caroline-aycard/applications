<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorateur d'Artistes</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .filter-section { margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; }
        .filter-group { margin-bottom: 10px; }
        .filter-btn { padding: 8px 15px; margin: 3px; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; background: white; }
        .filter-btn.active { background: #007bff; color: white; border-color: #007bff; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 15px; }
        .card h3 { margin: 0 0 10px; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>Mon Catalogue Artistes</h1>

    <div class="filter-section">
        <div id="filter-themes" class="filter-group"><strong>Thèmes :</strong></div>
        <div id="filter-techniques" class="filter-group"><strong>Techniques :</strong></div>
    </div>

    <div id="results" class="grid"></div>

    <script src="data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        
        // Initialisation : Création des boutons
        function initFilters() {
            const themes = new Set();
            const techs = new Set();
            DATA_SOURCE.artistes.forEach(a => {
                a.themes.forEach(t => themes.add(t));
                a.techniques.forEach(t => techs.add(t));
            });

            createButtons('filter-themes', themes, 'theme');
            createButtons('filter-techniques', techs, 'tech');
        }

        function createButtons(containerId, set, type) {
            const container = document.getElementById(containerId);
            Array.from(set).sort().forEach(val => {
                const btn = document.createElement('button');
                btn.textContent = val;
                btn.className = 'filter-btn ' + type;
                btn.onclick = () => {
                    btn.classList.toggle('active');
                    render();
                };
                container.appendChild(btn);
            });
        }

        function render() {
            const activeThemes = Array.from(document.querySelectorAll('.filter-btn.theme.active')).map(b => b.textContent);
            const activeTechs = Array.from(document.querySelectorAll('.filter-btn.tech.active')).map(b => b.textContent);

            const filtered = DATA_SOURCE.artistes.filter(a => {
                const matchTheme = activeThemes.length === 0 || a.themes.some(t => activeThemes.includes(t));
                const matchTech = activeTechs.length === 0 || a.techniques.some(t => activeTechs.includes(t));
                return matchTheme && matchTech;
            });

            resultsDiv.innerHTML = filtered.map(a => `
                <div class="card">
                    <img src="images/${a.id}.jpg" alt="${a.nom}" onerror="this.style.display='none'">
                    <div class="card-content">
                        <h3>${a.nom}</h3>
                        <p><small>${a.dates}</small></p>
                    </div>
                </div>
            `).join('');
        }

        initFilters();
        render();
    </script>
</body>
</html>
